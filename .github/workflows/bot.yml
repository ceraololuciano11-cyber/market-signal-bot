name: Market Signal Bot

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes, 24/7
  workflow_dispatch:           # keep manual trigger for testing

concurrency:
  group: market-signal-bot
  cancel-in-progress: true    # never run two instances at once

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # Restore seen_headlines.json from the previous run so the bot
      # remembers which headlines / signals / recap date it already sent.
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: seen_headlines.json
          key: seen-${{ github.run_number }}
          restore-keys: seen-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          CHAT_ID_2: ${{ secrets.CHAT_ID_2 }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: python market_signal_bot.py

      # Save the updated state file even if the bot step failed,
      # so cooldowns / recap date / seen headlines are never lost.
      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_headlines.json
          key: seen-${{ github.run_number }}
